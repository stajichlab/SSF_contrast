[workspace]
authors = ["Jason Stajich <jasonstajich.phd@gmail.com>"]
channels = ["conda-forge", "main", "r", "msys2", "https://conda.anaconda.org/nvidia"]
name = "evo2_classify"
platforms = ["linux-64"]
version = "0.1.0"

[activation]
env = { NVTE_FRAMEWORK = "pytorch" }
